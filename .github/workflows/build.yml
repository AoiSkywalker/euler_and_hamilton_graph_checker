name: Đóng gói PyInstaller tự động

on:
  push:
    branches: [ "main", "master" ] # Chạy khi bạn push code lên nhánh main hoặc master
  workflow_dispatch: # Cho phép bạn bấm nút "Run workflow" thủ công trên web GitHub

jobs:
  build:
    name: Build trên ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Chạy song song trên cả máy ảo Windows và macOS của GitHub
        os: [windows-latest, macos-latest]

    steps:
    # Bước 1: Tải code từ kho lưu trữ về máy ảo
    - name: Checkout code
      uses: actions/checkout@v4

    # Bước 2: Cài đặt Python trên máy ảo
    - name: Cài đặt Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Bạn có thể đổi thành phiên bản Python bạn muốn

    # Bước 3: Cài đặt các thư viện cần thiết
    - name: Cài đặt thư viện
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if (Test-Path requirements.txt) { pip install -r requirements.txt }
      shell: pwsh # Dùng PowerShell chung cho cả Win và Mac để chạy lệnh kiểm tra file

    # Bước 4: Chạy lệnh PyInstaller để đóng gói
    - name: Đóng gói bằng PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --onefile main.py
        # Nếu app của bạn có giao diện (GUI), hãy dùng lệnh dưới thay thế:
        # pyinstaller --onefile --windowed main.py

    - name: Đóng gói bằng PyInstaller (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --onefile main.py
        # Nếu muốn đóng gói dạng .app cho Mac thì dùng:
        # pyinstaller --onefile --windowed main.py

    # Bước 5: Upload file thành phẩm lên GitHub để bạn tải về
    - name: Upload thành phẩm
      uses: actions/upload-artifact@v4
      with:
        name: Hameur-${{ matrix.os }}
        path: dist/
